name: Run Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CI: true

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20  # satisfies ESLint engines

      # 3️⃣ Disable Husky prepare script
      - name: Disable Husky prepare in CI
        run: |
          node -p "let p=require('./package.json'); p.scripts.prepare=''; require('fs').writeFileSync('package.json', JSON.stringify(p,null,2))"

      # 4️⃣ Install dependencies
      - name: Install dependencies
        run: npm install

      # 5️⃣ Run tests
      - name: Run tests
        run: npx jest --coverage