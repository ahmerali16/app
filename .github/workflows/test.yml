name: Run Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18   # Or 20 if ESLint requires

      - name: Install dependencies and disable Husky
        run: |
          npm set-script prepare ""
          npm install

      - name: Show Node/npm info (debug)
        run: |
          node --version
          npm --version
          npx --version
          ls -la node_modules/.bin

      - name: Run tests
        run: npx jest --coverage