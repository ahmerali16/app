name: Run Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CI: true   # helps Husky know it's CI

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20   # matches ESLint requirements

      # 3️⃣ Disable Husky prepare scripts
      - name: Disable Husky in CI
        run: npm pkg set scripts.prepare=""

      # 4️⃣ Install dependencies
      - name: Install dependencies
        run: npm install

      # 5️⃣ Run tests
      - name: Run tests
        run: npx jest --coverage