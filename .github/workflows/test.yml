name: Run Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CI: true  # This disables Husky hooks automatically

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20  # Upgrade to 20 to satisfy ESLint engines

      # 3️⃣ Install dependencies without running Husky
      - name: Install dependencies
        run: npm install

      # 4️⃣ Debug info (optional)
      - name: Show environment info
        run: |
          node --version
          npm --version
          npx --version
          ls -la node_modules/.bin

      # 5️⃣ Run tests with local Jest
      - name: Run tests
        run: npx jest --coverage