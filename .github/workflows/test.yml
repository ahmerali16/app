name: Run Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CI: true

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # Disable Husky prepare script
      - name: Disable Husky prepare in CI
        run: |
          node -p "let p=require('./package.json'); p.scripts.prepare=''; require('fs').writeFileSync('package.json', JSON.stringify(p,null,2))"

      # Install dependencies including dev
      - name: Install dependencies
        run: npm install --include=dev

      # Show debug info
      - name: Show environment info
        run: |
          node --version
          npm --version
          npx --version
          ls -la node_modules/.bin

      # Run Jest
      - name: Run tests
        run: ./node_modules/.bin/jest --coverage